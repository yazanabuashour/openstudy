name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-release:
    name: Verify release inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Validate release notes and changelog
        run: ./scripts/validate-release-docs.sh "${GITHUB_REF_NAME}"

      - name: Validate Agent Skill
        run: ./scripts/validate-agent-skill.sh

      - name: Validate committed artifacts
        run: ./scripts/validate-committed-artifacts.sh

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify-release
    environment:
      name: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Prepare release metadata
        id: meta
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME#v}"
          archive="openstudy_${version}_source.tar.gz"
          skill="openstudy_${version}_skill.tar.gz"
          checksum="openstudy_${version}_checksums.txt"
          sbom="openstudy_${version}_sbom.json"
          installer="install.sh"
          assets_json="$(printf '%s\n' \
            "${installer}" \
            "${checksum}" \
            "openstudy_${version}_darwin_amd64.tar.gz" \
            "openstudy_${version}_darwin_arm64.tar.gz" \
            "openstudy_${version}_linux_amd64.tar.gz" \
            "openstudy_${version}_linux_arm64.tar.gz" \
            "${sbom}" \
            "${skill}" \
            "${archive}" \
            | jq -R . | jq -cs .)"

          {
            echo "archive=${archive}"
            echo "skill=${skill}"
            echo "checksum=${checksum}"
            echo "sbom=${sbom}"
            echo "installer=${installer}"
            echo "assets_json=${assets_json}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build binary and skill archives
        run: |
          version="${GITHUB_REF_NAME#v}"
          targets=(
            "darwin/arm64"
            "darwin/amd64"
            "linux/amd64"
            "linux/arm64"
          )

          for target in "${targets[@]}"; do
            IFS=/ read -r os arch <<< "${target}"
            name="openstudy_${version}_${os}_${arch}"
            mkdir -p "dist/${name}"
            GOOS="${os}" GOARCH="${arch}" go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/${name}/openstudy" ./cmd/openstudy
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done

          mkdir -p dist/skill/openstudy
          cp skills/openstudy/SKILL.md dist/skill/openstudy/SKILL.md
          tar -C dist/skill -czf "dist/${{ steps.meta.outputs.skill }}" openstudy
          rm -rf dist/skill

      - name: Generate release SBOM
        run: |
          go run github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.9.0 \
            mod \
            -json \
            -type library \
            -output "dist/${{ steps.meta.outputs.sbom }}" \
            .

      - name: Build installer
        run: |
          sed "s/__OPENSTUDY_VERSION__/${GITHUB_REF_NAME}/g" scripts/install.sh > "dist/${{ steps.meta.outputs.installer }}"
          chmod 755 "dist/${{ steps.meta.outputs.installer }}"

      - name: Build source archive and checksums
        run: |
          version="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="openstudy_${version}/" -o "dist/${{ steps.meta.outputs.archive }}" "${GITHUB_REF_NAME}"
          (
            cd dist
            shasum -a 256 *.tar.gz "${{ steps.meta.outputs.sbom }}" "${{ steps.meta.outputs.installer }}" > "${{ steps.meta.outputs.checksum }}"
          )

      - name: Create draft GitHub Release from tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
          release_json="$(gh release view "${GITHUB_REF_NAME}" --json isDraft 2>/dev/null || true)"
          if [ -n "${release_json}" ]; then
            is_draft="$(printf '%s\n' "${release_json}" | jq -r '.isDraft')"
            if [ "${is_draft}" != "true" ]; then
              echo "Release ${GITHUB_REF_NAME} already exists and is not a draft; refusing to mutate a published release." >&2
              exit 1
            fi
            gh release edit "${GITHUB_REF_NAME}" --notes-file "${notes_file}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --draft \
              --verify-tag \
              --notes-file "${notes_file}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber

      - name: Verify draft GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_ASSETS: ${{ steps.meta.outputs.assets_json }}
        run: |
          release_json="$(gh release view "${GITHUB_REF_NAME}" --json isDraft,assets)"
          is_draft="$(printf '%s\n' "${release_json}" | jq -r '.isDraft')"
          [ "${is_draft}" = "true" ] || { echo "Release ${GITHUB_REF_NAME} is not draft before publish" >&2; exit 1; }

          actual_assets="$(printf '%s\n' "${release_json}" | jq -c '[.assets[].name] | sort')"
          expected_assets="$(printf '%s\n' "${EXPECTED_ASSETS}" | jq -c 'sort')"
          [ "${actual_assets}" = "${expected_assets}" ] || {
            echo "Draft release assets do not match expected set" >&2
            echo "expected: ${expected_assets}" >&2
            echo "actual:   ${actual_assets}" >&2
            exit 1
          }

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/*

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: dist/${{ steps.meta.outputs.archive }}
          sbom-path: dist/${{ steps.meta.outputs.sbom }}

      - name: Publish draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest

      - name: Verify published GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_json="$(gh release view "${GITHUB_REF_NAME}" --json isDraft,isPrerelease)"
          is_draft="$(printf '%s\n' "${release_json}" | jq -r '.isDraft')"
          is_prerelease="$(printf '%s\n' "${release_json}" | jq -r '.isPrerelease')"
          [ "${is_draft}" = "false" ] || { echo "Release ${GITHUB_REF_NAME} is still draft" >&2; exit 1; }
          [ "${is_prerelease}" = "false" ] || { echo "Release ${GITHUB_REF_NAME} is prerelease" >&2; exit 1; }

          latest_tag="$(gh release view --json tagName --jq '.tagName')"
          [ "${latest_tag}" = "${GITHUB_REF_NAME}" ] || { echo "Latest release is ${latest_tag}, expected ${GITHUB_REF_NAME}" >&2; exit 1; }
